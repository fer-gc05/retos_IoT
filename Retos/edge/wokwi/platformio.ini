; Proyecto borde — ESP32 + MQTT (Wokwi)
; Compilar: pio run   |   Simular: F1 → Wokwi: Start Simulator

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^6.21.5
build_flags =
  -D MQTT_MAX_PACKET_SIZE=512
